<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HMY1P57808"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      gtag('config', 'G-HMY1P57808');

    <title>Vinicius Coimbra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #1f1f1f;
            --text: #f5f5f5;
            --text-secondary: #888;
            --card-bg: #1a1a1a;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --surface: #f5f5f5;
            --border: #e5e5e5;
            --text: #0a0a0a;
            --text-secondary: #666;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 15vh;
            transition: background 0.4s ease, color 0.4s ease;
            cursor: none;
        }

        .cursor-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: var(--text);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        .cursor-trail {
            position: fixed;
            pointer-events: none;
            z-index: 9995;
            filter: blur(1px);
        }

        .cursor-trail canvas {
            display: block;
        }

        a, button, .link-btn, .copy-btn, .theme-toggle, .profile-pic {
            cursor: none;
        }

        @media (hover: none) and (pointer: coarse) {
            body, a, button, .link-btn, .copy-btn, .theme-toggle, .profile-pic { cursor: auto; }
            .cursor-dot, .cursor-trail { display: none; }
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            animation: fadeIn 0.6s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0;
            line-height: 1;
            transition: color 0.25s ease, transform 0.3s ease;
            margin-bottom: 60px;
            opacity: 0.7;
        }

        .theme-toggle:hover {
            color: var(--text);
            opacity: 1;
            transform: rotate(12deg);
        }

        .theme-toggle:active {
            transform: rotate(30deg) scale(0.92);
        }

        .theme-toggle svg {
            width: 42px;
            height: 42px;
        }

        .profile-pic {
            width: 117px;
            height: 117px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center;
            margin: 0 0 16px;
            border: 1.5px solid var(--border);
            filter: grayscale(100%);
            transition: border-color 0.3s ease, transform 0.4s ease, filter 0.4s ease;
            outline: 1px solid transparent;
            outline-offset: 3px;
        }

        .profile-pic:hover {
            border-color: var(--text-secondary);
            transform: scale(1.03);
            filter: grayscale(60%);
        }

        .nome {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
            letter-spacing: 0.02em;
        }

        .links {
            display: flex;
            gap: 2.5rem;
            padding: 0 2rem;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .links::before,
        .links::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 32px;
            height: 1px;
            background: var(--border);
            opacity: 0.5;
        }

        .links::before { right: calc(100% + 0.75rem); }
        .links::after  { left: calc(100% + 0.75rem); }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-secondary);
            transition: color 0.25s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .link-btn svg {
            width: 22px;
            height: 22px;
        }

        .link-btn:hover {
            color: var(--text);
            transform: translateY(-3px);
        }

        .link-btn:active {
            transform: translateY(-1px) scale(0.95);
        }

        .email-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .email-overlay.show {
            display: flex;
            animation: overlayIn 0.2s ease both;
        }

        @keyframes overlayIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .email-modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            min-width: 300px;
            animation: modalSlide 0.25s ease both;
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(8px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .email-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .email-modal-header h3 {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text);
            margin: 0;
            letter-spacing: 0.02em;
        }

        .email-close-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px;
            display: flex;
            align-items: center;
            transition: color 0.2s, transform 0.2s;
            border-radius: 6px;
        }

        .email-close-btn:hover {
            color: var(--text);
            transform: rotate(90deg);
        }

        .email-close-btn svg {
            width: 20px;
            height: 20px;
        }

        .email-modal-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.5rem 0;
            border-top: 1px solid var(--border);
        }

        .email-modal-row:first-of-type {
            border-top: none;
        }

        .email-modal-row span {
            color: var(--text);
            font-size: 0.85rem;
            letter-spacing: -0.01em;
        }

        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px;
            display: flex;
            align-items: center;
            transition: color 0.2s, transform 0.2s;
            flex-shrink: 0;
            border-radius: 6px;
        }

        .copy-btn:hover {
            color: var(--text);
            transform: scale(1.1);
        }

        .copy-btn:active {
            transform: scale(0.9);
        }

        .copy-btn svg {
            width: 21px;
            height: 21px;
        }

        @media (max-width: 480px) {
            body { padding-top: 12vh; }
            .links { gap: 1.75rem; }
            .link-btn svg { width: 36px; height: 36px; }
            .profile-pic { width: 62px; height: 62px; }
            .theme-toggle { margin-bottom: 40px; }
            .links::before, .links::after { display: none; }
            .email-modal { min-width: unset; width: calc(100% - 2rem); }
        }
    </style>
</head>
<body>

    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-trail" id="cursorTrail"><canvas id="trailCanvas"></canvas></div>

    <div class="wrapper">
        <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
            <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>

        <img src="foto.jpeg" alt="Vinicius Coimbra" class="profile-pic">

        <p class="nome">Vinicius Coimbra</p>
        <p class="subtitle">jornalismo, IA e programação</p>

        <div class="links">
        <a href="https://www.linkedin.com/in/vinicius-coimbra-98565a301/" target="_blank" rel="noopener noreferrer" class="link-btn" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        </a>
        <a href="mailto:contato@viniciuscoimbra.com" class="link-btn" id="emailBtn" aria-label="E-mail">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
        </a>
        <a href="https://www.instagram.com/viniciuscoimbraalves/" target="_blank" rel="noopener noreferrer" class="link-btn" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        </a>
        <a href="/textos/" class="link-btn" aria-label="Textos" style="text-decoration:none; color:var(--text-secondary); font-size:0.82rem; font-weight:700; letter-spacing:0.08em; transition:color 0.25s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);" onmouseover="this.style.color='var(--text)'; this.style.transform='translateY(-3px)';" onmouseout="this.style.color='var(--text-secondary)'; this.style.transform='';">TEXTOS
        </a>
        </div>
    </div>

    <div class="email-overlay" id="emailOverlay">
        <div class="email-modal">
            <div class="email-modal-header">
                <h3>E-mails</h3>
                <button class="email-close-btn" id="emailCloseBtn" aria-label="Fechar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="email-modal-row">
                <span>contato@viniciuscoimbra.com</span>
                <button class="copy-btn" data-email="contato@viniciuscoimbra.com" aria-label="Copiar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
            </div>
            <div class="email-modal-row">
                <span>vinicius.coimbra@zerohora.com.br</span>
                <button class="copy-btn" data-email="vinicius.coimbra@zerohora.com.br" aria-label="Copiar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;

        function setTheme(theme) {
            html.setAttribute('data-theme', theme);
            const isDark = theme === 'dark';
            themeIcon.innerHTML = isDark
                ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
                : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
            localStorage.setItem('theme', theme);
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        });

        const emailBtn = document.getElementById('emailBtn');
        const overlay = document.getElementById('emailOverlay');
        const closeBtn = document.getElementById('emailCloseBtn');

        function openOverlay() { overlay.classList.add('show'); }
        function closeOverlay() { overlay.classList.remove('show'); }

        emailBtn.addEventListener('click', (e) => {
            e.preventDefault();
            openOverlay();
        });

        closeBtn.addEventListener('click', closeOverlay);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeOverlay();
        });

        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const email = btn.getAttribute('data-email');
                try {
                    await navigator.clipboard.writeText(email);
                    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                    setTimeout(() => {
                        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
                    }, 1500);
                } catch {}
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeOverlay();
        });

        /* ── Cursor cometa ── */
        const dot = document.getElementById('cursorDot');
        const trailCanvas = document.getElementById('trailCanvas');
        const ctx = trailCanvas.getContext('2d');

        let w = trailCanvas.width = window.innerWidth;
        let h = trailCanvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            w = trailCanvas.width = window.innerWidth;
            h = trailCanvas.height = window.innerHeight;
        });

        let points = [];
        const MAX_POINTS = 24;
        let mouseX = -100, mouseY = -100;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            dot.style.left = mouseX + 'px';
            dot.style.top = mouseY + 'px';
        });

        document.addEventListener('mouseleave', () => {
            mouseX = -100;
            mouseY = -100;
        });

        function getTrailColor() {
            const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
            return isDark ? '255,255,255' : '0,0,0';
        }

        function drawTrail() {
            ctx.clearRect(0, 0, w, h);

            if (mouseX < 0 || mouseY < 0) {
                points = [];
                requestAnimationFrame(drawTrail);
                return;
            }

            points.push({ x: mouseX, y: mouseY });
            if (points.length > MAX_POINTS) points.shift();

            const len = points.length;
            if (len < 2) { requestAnimationFrame(drawTrail); return; }

            const rgb = getTrailColor();

            for (let i = 1; i < len; i++) {
                const alpha = (i / len) * 0.7;
                const width = (i / len) * 5 + 1;

                ctx.beginPath();
                ctx.moveTo(points[i - 1].x, points[i - 1].y);
                ctx.lineTo(points[i].x, points[i].y);
                ctx.strokeStyle = `rgba(${rgb},${alpha})`;
                ctx.lineWidth = width;
                ctx.lineCap = 'round';
                ctx.stroke();
            }

            requestAnimationFrame(drawTrail);
        }
        drawTrail();
    </script>
</body>
</html>
