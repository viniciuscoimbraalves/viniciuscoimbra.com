<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinícius Coimbra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #1f1f1f;
            --text: #f5f5f5;
            --text-secondary: #888;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --card-bg: #1a1a1a;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --surface: #f5f5f5;
            --border: #e5e5e5;
            --text: #0a0a0a;
            --text-secondary: #666;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 100;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text);
            font-size: 20px;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .links {
            display: flex;
            gap: 1rem;
            padding: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s;
        }

        .link-btn:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .link-btn svg {
            width: 28px;
            height: 28px;
        }

        .link-btn.instagram:hover { border-color: #e1306c; }
        .link-btn.linkedin:hover { border-color: #0a66c2; }
        .link-btn.website:hover { border-color: var(--accent); }

        @media (max-width: 480px) {
            .link-btn {
                width: 64px;
                height: 64px;
            }
            .link-btn svg {
                width: 24px;
                height: 24px;
            }
            .links { gap: 0.75rem; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
        <span id="themeIcon">☀️</span>
    </button>

    <div class="links">
        <a href="https://www.instagram.com/viniciuscoimbraalves/" target="_blank" rel="noopener noreferrer" class="link-btn instagram" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        </a>

        <a href="https://www.linkedin.com/in/vinicius-coimbra-98565a301/" target="_blank" rel="noopener noreferrer" class="link-btn linkedin" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        </a>

        <a href="https://gauchazh.clicrbs.com.br/autores/vinicius-coimbra/625dc07ba43c78173ccd1423.html" target="_blank" rel="noopener noreferrer" class="link-btn website" aria-label="GaúchaZH">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </a>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;

        function setTheme(theme) {
            html.setAttribute('data-theme', theme);
            themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', theme);
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        });
    </script>
</body>
</html>
