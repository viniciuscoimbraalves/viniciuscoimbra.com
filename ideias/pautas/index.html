<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/ideias/pautas/">
    <title>Sugestão de Pautas — GHC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #1f1f1f;
            --text: #f5f5f5;
            --text-secondary: #888;
            --card-bg: #1a1a1a;
            --accent: #4f9cf7;
            --accent-hover: #6baeff;
        }

        [data-theme="light"] {
            --bg: #f5f5f5;
            --surface: #ffffff;
            --border: #e0e0e0;
            --text: #1a1a1a;
            --text-secondary: #666;
            --card-bg: #ffffff;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .header-left h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header-left .sub {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .header-left .sub a {
            color: var(--accent);
            text-decoration: none;
        }

        .header-left .sub a:hover {
            text-decoration: underline;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 6px;
            display: flex;
            transition: color 0.25s, border-color 0.25s, transform 0.3s;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            color: var(--text);
            border-color: var(--text-secondary);
            transform: rotate(12deg);
        }

        .theme-toggle svg {
            width: 22px;
            height: 22px;
        }

        .controls {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 1rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            flex: 1;
            min-width: 120px;
        }

        .control-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .control-group select {
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .control-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.6rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            white-space: nowrap;
            height: fit-content;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.82rem;
            color: var(--text-secondary);
            min-height: 48px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
            display: none;
        }

        .spinner.active {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-area {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            animation: fadeIn 0.4s ease both;
        }

        .result-card .date-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.5rem;
        }

        .result-card .suggestion-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .result-card .suggestion-desc {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .result-card .source-link {
            display: inline-block;
            margin-top: 0.75rem;
            font-size: 0.8rem;
            color: var(--accent);
            text-decoration: none;
        }

        .result-card .source-link:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .token-info {
            font-size: 0.72rem;
            color: var(--text-secondary);
            padding: 0.4rem 0;
            opacity: 0.7;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .container { padding: 1.25rem 1rem 3rem; }
            .controls { flex-direction: column; align-items: stretch; }
            .control-group { min-width: unset; }
            .btn-primary { width: 100%; text-align: center; padding: 0.7rem; }
            .header-left h1 { font-size: 1.15rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>Sugestão de Pautas</h1>
                <div class="sub">
                    <a href="/ideias/" target="_blank">&#8592; Arquivo de notícias GHC</a>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
                <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="anoInicio">De</label>
                <select id="anoInicio"></select>
            </div>
            <div class="control-group">
                <label for="anoFim">Até</label>
                <select id="anoFim"></select>
            </div>
            <button class="btn-primary" id="btnAnalisar">Analisar manchetes</button>
        </div>

        <div class="status-bar" id="statusBar">
            <div class="spinner" id="spinner"></div>
            <span id="statusText">Selecione um período e clique em "Analisar manchetes"</span>
        </div>

        <div class="token-info" id="tokenInfo"></div>

        <div class="result-area" id="resultArea">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
                <p>As sugestões de pauta aparecerão aqui.<br>Escolha um período para começar.</p>
            </div>
        </div>
    </div>

    <script>
        // ---- Tema ----
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const html = document.documentElement;

        function setTheme(theme) {
            html.setAttribute('data-theme', theme);
            const isDark = theme === 'dark';
            themeIcon.innerHTML = isDark
                ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
                : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
            localStorage.setItem('pautas_theme', theme);
        }

        const savedTheme = localStorage.getItem('pautas_theme') || 'dark';
        setTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        });

        // ---- Estado ----
        const ANOS = [];
        for (let a = 2011; a <= 2026; a++) ANOS.push(a);

        const DEEPSEEK_KEY = 'sk-d079eaad8c0442089a2a363528871df4';
        const DEEPSEEK_URL = 'https://api.deepseek.com/chat/completions';

        // ---- DOM ----
        const anoInicio = document.getElementById('anoInicio');
        const anoFim = document.getElementById('anoFim');
        const btnAnalisar = document.getElementById('btnAnalisar');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        const resultArea = document.getElementById('resultArea');
        const tokenInfo = document.getElementById('tokenInfo');

        // ---- Preencher selects ----
        ANOS.forEach(a => {
            anoInicio.innerHTML += `<option value="${a}">${a}</option>`;
            anoFim.innerHTML += `<option value="${a}">${a}</option>`;
        });
        anoInicio.value = '2025';
        anoFim.value = '2026';

        // ---- Status helper ----
        function setStatus(msg, isError) {
            statusText.textContent = msg;
            statusText.style.color = isError ? '#ef4444' : '';
        }

        function setLoading(loading) {
            spinner.classList.toggle('active', loading);
            btnAnalisar.disabled = loading;
        }

        // ---- Buscar dados dos anos ----
        async function fetchManchetes(anoIni, anoFim) {
            const anos = [];
            for (let a = anoIni; a <= anoFim; a++) anos.push(a);

            const results = await Promise.allSettled(
                anos.map(a =>
                    fetch(`/ideias/data_${a}.json`).then(r => {
                        if (!r.ok) throw new Error(`HTTP ${r.status}`);
                        return r.json();
                    })
                )
            );

            let manchetes = [];
            results.forEach((res, i) => {
                if (res.status === 'fulfilled') {
                    res.value.forEach(item => {
                        manchetes.push({ d: item.d, t: item.t, l: item.l, ano: anos[i] });
                    });
                }
            });

            return manchetes;
        }

        // ---- Montar prompt ----
        function montarPrompt(manchetes) {
            const linhas = manchetes.map(m => `[${m.d}] ${m.t}`).join('\n');
            return `Atue como um editor e repórter sênior da assessoria de imprensa de um hospital público. Você está revisando o arquivo de notícias publicadas no site da instituição para identificar pautas que poderiam ser revisitadas com um novo gancho.

REGRA FUNDAMENTAL: NÃO sugira pautas sobre eventos únicos datados (como campanhas pontuais, dias comemorativos específicos, eventos que já aconteceram). Foque APENAS em temas atemporais ou recorrentes: histórias humanas emocionantes, investimentos em infraestrutura, melhorias nos serviços, inovações tecnológicas, programas contínuos, perfis de pacientes ou profissionais.

Para cada sugestão, forneça:
- TÍTULO: um título chamativo para a nova reportagem
- JUSTIFICATIVA: por que esse assunto merece ser recuperado (2-3 frases)
- GANCHO: que ângulo novo poderia ser usado (1-2 frases)

FORMATO DE RESPOSTA (use exatamente este formato, separando cada sugestão com "---"):

TÍTULO: [título da pauta]
JUSTIFICATIVA: [texto]
GANCHO: [texto]
---

TÍTULO: [próximo título]
JUSTIFICATIVA: [texto]
GANCHO: [texto]
---

(continue para cada sugestão)

Aqui estão as manchetes do período selecionado:

${linhas}`;
        }

        // ---- Estimar tokens ----
        function estimarTokens(texto) {
            return Math.ceil(texto.length / 4);
        }

        // ---- Renderizar resultado ----
        function renderizarSugestoes(texto) {
            const blocos = texto.split('---').filter(b => b.trim());
            resultArea.innerHTML = '';

            if (blocos.length === 0) {
                resultArea.innerHTML = `<div class="result-card"><p style="color:var(--text-secondary);">Nenhuma sugestão foi retornada. Tente novamente.</p></div>`;
                return;
            }

            blocos.forEach((bloco, idx) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.style.animationDelay = `${idx * 0.1}s`;

                const tituloMatch = bloco.match(/TÍTULO:\s*(.+)/i);
                const justMatch = bloco.match(/JUSTIFICATIVA:\s*(.+)/i);
                const ganchoMatch = bloco.match(/GANCHO:\s*(.+)/i);

                let html = '';
                if (tituloMatch) {
                    html += `<div class="date-badge">Sugestão ${idx + 1}</div>`;
                    html += `<div class="suggestion-title">${tituloMatch[1]}</div>`;
                }
                if (justMatch) {
                    html += `<div class="suggestion-desc"><strong>Justificativa:</strong> ${justMatch[1]}</div>`;
                }
                if (ganchoMatch) {
                    html += `<div class="suggestion-desc" style="margin-top:0.5rem;"><strong>Gancho:</strong> ${ganchoMatch[1]}</div>`;
                }

                if (!html) {
                    html = `<div class="suggestion-desc">${bloco.trim()}</div>`;
                }

                card.innerHTML = html;
                resultArea.appendChild(card);
            });
        }

        // ---- Chamar DeepSeek ----
        async function analisar() {
            const ini = parseInt(anoInicio.value);
            const fim = parseInt(anoFim.value);

            if (ini > fim) {
                setStatus('O ano inicial deve ser menor ou igual ao ano final.', true);
                return;
            }

            setLoading(true);
            setStatus('Buscando manchetes...');
            resultArea.innerHTML = '';
            tokenInfo.textContent = '';

            try {
                const manchetes = await fetchManchetes(ini, fim);

                if (manchetes.length === 0) {
                    setStatus('Nenhuma notícia encontrada neste período.', true);
                    setLoading(false);
                    return;
                }

                setStatus(`${manchetes.length} manchetes encontradas. Enviando para DeepSeek...`);

                const prompt = montarPrompt(manchetes);
                const tokensEst = estimarTokens(prompt);
                tokenInfo.textContent = `~${tokensEst.toLocaleString()} tokens estimados (manchetes: ${manchetes.length})`;

                const response = await fetch(DEEPSEEK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            { role: 'user', content: prompt }
                        ],
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) {
                    const errBody = await response.text().catch(() => '');
                    throw new Error(`DeepSeek retornou HTTP ${response.status}: ${errBody}`);
                }

                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || '';

                if (!reply) {
                    throw new Error('Resposta vazia da DeepSeek');
                }

                renderizarSugestoes(reply);
                setStatus(`${manchetes.length} manchetes analisadas. ${data.usage?.total_tokens ? `Tokens: ${data.usage.total_tokens}` : ''}`);
            } catch (err) {
                setStatus('Erro: ' + err.message, true);
                resultArea.innerHTML = `<div class="result-card error-msg">${err.message}</div>`;
            } finally {
                setLoading(false);
            }
        }

        btnAnalisar.addEventListener('click', analisar);

        // ---- Enter nos selects dispara ----
        document.querySelectorAll('select').forEach(el => {
            el.addEventListener('keydown', e => {
                if (e.key === 'Enter') analisar();
            });
        });
    </script>
</body>
</html>
