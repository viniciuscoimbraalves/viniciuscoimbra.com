<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>textos — Vinicius Coimbra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #1f1f1f;
            --text: #f5f5f5;
            --text-secondary: #888;
            --card-bg: #1a1a1a;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --surface: #f5f5f5;
            --border: #e5e5e5;
            --text: #0a0a0a;
            --text-secondary: #666;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 480px;
            padding: 2rem;
        }

        .back {
            align-self: flex-start;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
            margin-bottom: 2rem;
        }

        .back:hover {
            color: var(--text);
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .sub {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .texto-link {
            display: block;
            width: 100%;
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.95rem;
            transition: border-color 0.2s, transform 0.2s;
        }

        .texto-link:hover {
            border-color: var(--text-secondary);
            transform: translateY(-1px);
        }

        .texto-link .titulo {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .texto-link .desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        @media (max-width: 480px) {
            .wrapper { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <a href="/" class="back">&larr; viniciuscoimbra.com</a>

        <h1>textos</h1>
        <p class="sub">coisas que escrevi</p>

        <a href="#" class="texto-link">
            <div class="titulo">Título do texto</div>
            <div class="desc">Descrição breve — veículo, data</div>
        </a>

        <a href="#" class="texto-link">
            <div class="titulo">Título do texto</div>
            <div class="desc">Descrição breve — veículo, data</div>
        </a>

        <a href="#" class="texto-link">
            <div class="titulo">Título do texto</div>
            <div class="desc">Descrição breve — veículo, data</div>
        </a>
    </div>

    <script>
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
